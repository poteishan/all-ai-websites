<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>C</title>
    <!-- jsPDF CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<style>
    :root {
        --accent: #0b76ef;
        --muted: #6b7280;
        --bg: #f7fafc;
        --card: #ffffff;
        --radius: 10px;
        --max-width: 980px;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    * {
        box-sizing: border-box
    }

    body {
        margin: 0;
        background: linear-gradient(180deg, #f0f6ff 0%, var(--bg) 100%);
        color: #0f172a;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    .container {
        max-width: var(--max-width);
        margin: 24px auto;
        padding: 0 18px;
    }

    .site-header {
        background: linear-gradient(90deg, var(--accent), #3aa0ff);
        color: white;
        padding: 28px 0;
        border-bottom-left-radius: 18px;
        border-bottom-right-radius: 18px;
        margin-bottom: 18px;
    }

    .site-header h1 {
        margin: 0;
        font-size: 1.6rem
    }

    .tagline {
        opacity: 0.95;
        margin-top: 6px
    }

    .booking-card {
        background: var(--card);
        padding: 18px;
        border-radius: var(--radius);
        box-shadow: 0 6px 18px rgba(11, 118, 239, 0.08);
        margin-bottom: 18px;
    }

    .booking-card h2 {
        margin-top: 0
    }

    .row {
        margin-bottom: 12px;
        display: flex;
        flex-direction: column
    }

    .row.inline {
        display: flex;
        gap: 12px
    }

    .row.inline>div {
        flex: 1
    }

    label {
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--muted)
    }

    input,
    select,
    textarea {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #e6eef8;
        background: #fff;
        font-size: 0.95rem;
    }

    .packages {
        display: flex;
        gap: 12px;
        flex-wrap: wrap
    }

    .packages label {
        font-weight: 500;
        color: #0f172a
    }

    .actions {
        display: flex;
        gap: 12px;
        align-items: center
    }

    .btn {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid rgba(15, 23, 42, 0.06);
        background: white;
        cursor: pointer;
        font-weight: 600;
    }

    .btn.primary {
        background: var(--accent);
        color: white;
        border: none;
        box-shadow: 0 6px 18px rgba(11, 118, 239, 0.12);
    }

    .bookings-list {
        margin-top: 12px;
        background: var(--card);
        padding: 14px;
        border-radius: var(--radius);
        box-shadow: 0 6px 18px rgba(2, 6, 23, 0.03);
    }

    .booking-item {
        border: 1px dashed #e6eef8;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .booking-meta {
        font-size: 0.9rem;
        color: var(--muted)
    }

    .small {
        font-size: 0.85rem;
        color: var(--muted)
    }

    .site-footer {
        padding: 18px 0;
        text-align: center;
        color: var(--muted)
    }

    @media (max-width:720px) {
        .row.inline {
            flex-direction: column
        }
    }
</style>

<body>
    <header class="site-header">
        <div class="container">
            <h1>Wanderly Tours & Travels</h1>
            <p class="tagline">Book hotels, food, and tour packages — get your ticket instantly.</p>
        </div>
    </header>

    <main class="container">
        <section class="booking-card">
            <h2>Book Your Trip</h2>
            <form id="bookingForm">
                <div class="row">
                    <label for="name">Full Name</label>
                    <input id="name" name="name" required />
                </div>

                <div class="row">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required />
                </div>

                <div class="row">
                    <label for="location">Location</label>
                    <select id="location" name="location" required>
                        <option value="">Select destination</option>
                        <option value="Goa">Goa</option>
                        <option value="Manali">Manali</option>
                        <option value="Kerala">Kerala</option>
                        <option value="Rajasthan">Rajasthan</option>
                        <option value="Leh-Ladakh">Leh-Ladakh</option>
                    </select>
                </div>

                <div class="row">
                    <label for="date">Travel Date</label>
                    <input id="date" name="date" type="date" required />
                </div>

                <div class="row inline">
                    <div>
                        <label for="hotel">Hotel</label>
                        <select id="hotel" name="hotel" required>
                            <option value="Standard Hotel">Standard Hotel</option>
                            <option value="Deluxe Hotel">Deluxe Hotel</option>
                            <option value="Luxury Resort">Luxury Resort</option>
                        </select>
                    </div>
                    <div>
                        <label for="food">Food Plan</label>
                        <select id="food" name="food" required>
                            <option value="Breakfast Only">Breakfast Only</option>
                            <option value="Half Board">Half Board</option>
                            <option value="Full Board">Full Board</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <label>Tour Package</label>
                    <div class="packages">
                        <label><input type="radio" name="package" value="Sightseeing" checked /> Sightseeing</label>
                        <label><input type="radio" name="package" value="Adventure" /> Adventure</label>
                        <label><input type="radio" name="package" value="Relaxation" /> Relaxation</label>
                    </div>
                </div>

                <div class="row">
                    <label for="guests">Guests</label>
                    <input id="guests" name="guests" type="number" min="1" value="1" required />
                </div>

                <div class="row actions">
                    <button type="submit" class="btn primary">Confirm & Generate Ticket</button>
                    <button type="button" id="viewBookings" class="btn">View Bookings</button>
                </div>
            </form>
        </section>

        <section class="bookings-list" id="bookingsList">
            <h2>Your Bookings</h2>
            <div id="bookingsContainer">No bookings yet.</div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <small>© <span id="year"></span> Wanderly Tours & Travels</small>
        </div>
    </footer>

    <script>// script.js
        const { jsPDF } = window.jspdf;

        document.getElementById('year').textContent = new Date().getFullYear();

        const bookingForm = document.getElementById('bookingForm');
        const bookingsContainer = document.getElementById('bookingsContainer');
        const viewBookingsBtn = document.getElementById('viewBookings');

        function loadBookings() {
            const raw = localStorage.getItem('wanderly_bookings');
            return raw ? JSON.parse(raw) : [];
        }

        function saveBookings(list) {
            localStorage.setItem('wanderly_bookings', JSON.stringify(list));
        }

        function renderBookings() {
            const list = loadBookings();
            if (!list.length) {
                bookingsContainer.innerHTML = '<p class="small">No bookings yet.</p>';
                return;
            }
            bookingsContainer.innerHTML = '';
            list.slice().reverse().forEach(b => {
                const div = document.createElement('div');
                div.className = 'booking-item';
                div.innerHTML = `
      <div>
        <div><strong>${escapeHtml(b.name)}</strong> — <span class="small">${escapeHtml(b.location)}</span></div>
        <div class="booking-meta">${escapeHtml(b.date)} • ${escapeHtml(b.package)} • ${b.guests} guest(s)</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn" data-id="${b.id}" onclick="downloadTicket('${b.id}')">Download PDF</button>
        <button class="btn" data-id="${b.id}" onclick="removeBooking('${b.id}')">Delete</button>
      </div>
    `;
                bookingsContainer.appendChild(div);
            });
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, function (m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
            });
        }

        function generateBookingData(formData) {
            return {
                id: 'BK' + Date.now(),
                name: formData.get('name'),
                email: formData.get('email'),
                location: formData.get('location'),
                date: formData.get('date'),
                hotel: formData.get('hotel'),
                food: formData.get('food'),
                package: formData.get('package'),
                guests: formData.get('guests'),
                createdAt: new Date().toISOString()
            };
        }

        bookingForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const fd = new FormData(bookingForm);
            const booking = generateBookingData(fd);

            // Save booking
            const list = loadBookings();
            list.push(booking);
            saveBookings(list);

            // Show success and generate PDF immediately
            alert('Booking successful! Your ticket will be downloaded.');
            renderBookings();
            downloadTicket(booking.id);
            bookingForm.reset();
        });

        viewBookingsBtn.addEventListener('click', renderBookings);

        function removeBooking(id) {
            if (!confirm('Delete this booking?')) return;
            let list = loadBookings();
            list = list.filter(b => b.id !== id);
            saveBookings(list);
            renderBookings();
        }

        function findBooking(id) {
            const list = loadBookings();
            return list.find(b => b.id === id);
        }

        function downloadTicket(id) {
            const booking = findBooking(id);
            if (!booking) {
                alert('Booking not found.');
                return;
            }

            // Create PDF using jsPDF
            const doc = new jsPDF({ unit: 'pt', format: 'a4' });
            const left = 40;
            let y = 60;
            doc.setFontSize(20);
            doc.setTextColor('#0b76ef');
            doc.text('Wanderly Tours & Travels', left, y);
            y += 28;
            doc.setFontSize(12);
            doc.setTextColor('#333');
            doc.text(`Ticket ID: ${booking.id}`, left, y);
            y += 20;
            doc.setDrawColor('#e6eef8');
            doc.setLineWidth(1);
            doc.line(left, y, 560, y);
            y += 18;

            doc.setFontSize(14);
            doc.text('Traveler Details', left, y);
            y += 16;
            doc.setFontSize(11);
            doc.text(`Name: ${booking.name}`, left, y); y += 14;
            doc.text(`Email: ${booking.email}`, left, y); y += 14;
            doc.text(`Guests: ${booking.guests}`, left, y); y += 20;

            doc.setFontSize(14);
            doc.text('Trip Details', left, y);
            y += 16;
            doc.setFontSize(11);
            doc.text(`Destination: ${booking.location}`, left, y); y += 14;
            doc.text(`Travel Date: ${booking.date}`, left, y); y += 14;
            doc.text(`Hotel: ${booking.hotel}`, left, y); y += 14;
            doc.text(`Food Plan: ${booking.food}`, left, y); y += 14;
            doc.text(`Package: ${booking.package}`, left, y); y += 20;

            doc.setFontSize(10);
            doc.setTextColor('#6b7280');
            doc.text('Terms: This ticket is generated for demonstration purposes. Please carry a valid ID during travel.', left, y);
            y += 30;

            // QR-like box with booking id (simple visual)
            doc.setDrawColor('#0b76ef');
            doc.setFillColor('#eaf4ff');
            doc.rect(420, 120, 120, 80, 'F');
            doc.setFontSize(12);
            doc.setTextColor('#0b76ef');
            doc.text('Ticket', 450, 150);
            doc.setFontSize(10);
            doc.setTextColor('#0b76ef');
            doc.text(booking.id, 450, 170);

            // Save file
            const filename = `${booking.id}_${booking.location}.pdf`;
            doc.save(filename);
        }

        // initial render
        renderBookings();
    </script>
</body>

</html>
